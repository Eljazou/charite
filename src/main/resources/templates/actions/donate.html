<!DOCTYPE html>
<html class="light" lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>PhilanthroLink - Faire un Don</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0053db",
            "on-surface": "#00345e",
            "on-surface-variant": "#306197",
            "background": "#f8f9ff",
            "surface-container-low": "#eff4ff",
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bg-primary-gradient { background: linear-gradient(135deg, #0053db 0%, #0048c1 100%); }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(0, 52, 94, 0.04); }
  </style>
</head>
<body class="bg-background text-on-surface flex">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<main class="ml-64 flex-1 min-h-screen">

  <header class="h-16 border-b border-slate-100 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 sticky top-0 z-40">
    <div class="flex items-center gap-2">
      <a th:href="@{/actions}" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-500">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <span class="text-sm font-semibold text-slate-600">Retour aux actions</span>
    </div>
    <div class="flex items-center gap-4">
      <img class="w-8 h-8 rounded-full border border-slate-200" src="https://ui-avatars.com/api/?name=User&background=0053db&color=fff" alt="Profile"/>
    </div>
  </header>

  <div class="max-w-3xl mx-auto py-12 px-6">

    <div class="mb-10">
      <span class="text-primary font-bold text-xs uppercase tracking-widest bg-blue-50 px-3 py-1 rounded-full">Soutien Caritatif</span>
      <h2 class="text-3xl font-extrabold mt-4 leading-tight">
        Faire un don pour : <span class="text-primary" th:text="${action.title}">Titre de l'action</span>
      </h2>
      <p class="text-on-surface-variant mt-2 font-medium italic">
        Votre générosité aide <span th:text="${action.organization.name}">l'organisation</span> à atteindre son objectif.
      </p>
    </div>

    <div th:if="${error}" class="mb-8 p-4 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3 animate-pulse">
      <span class="material-symbols-outlined text-red-600">warning</span>
      <p class="text-red-700 text-sm font-bold" th:text="${error}"></p>
    </div>

    <div class="bg-white rounded-3xl p-8 ambient-shadow border border-slate-50">
      <form method="post" th:action="@{/actions/{id}/donate(id=${action.id})}" th:object="${req}" class="space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="col-span-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3 ml-1">Montant (MAD)</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-primary">MAD</span>
              <input type="number" step="0.01" th:field="*{amount}" required
                     class="w-full pl-16 pr-4 py-3 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-lg font-bold outline-none transition-all"
                     placeholder="0.00"/>
            </div>
          </div>

          <div class="col-span-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3 ml-1">Méthode de paiement</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">payments</span>
              <select th:field="*{paymentMethod}"
                      class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-sm font-semibold outline-none appearance-none cursor-pointer">
                <option th:each="method : ${paymentMethods}"
                        th:value="${method}"
                        th:text="${method}">
                </option>
              </select>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3 ml-1">Votre message (Optionnel)</label>
          <textarea th:field="*{message}" rows="4"
                    class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-sm outline-none transition-all"
                    placeholder="Écrivez un petit mot d'encouragement..."></textarea>
        </div>

        <div class="pt-4">
          <button type="submit"
                  class="w-full py-4 bg-primary-gradient text-white rounded-2xl font-bold text-sm shadow-xl shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">favorite</span>
            Confirmer le don
          </button>
        </div>
      </form>
    </div>

    <p class="text-center mt-8 text-[11px] text-slate-400 font-medium">
      Paiement sécurisé via PhilanthroLink. Les fonds seront directement transférés à l'association.
    </p>
  </div>
</main>

</body>
</html>
