<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Découvrir les Actions</title>
  <th:block th:replace="~{layout/base :: common}"></th:block>
  <style>
    .ambient-shadow { box-shadow: 0 8px 32px rgba(0, 52, 94, 0.04); }
  </style>
</head>
<body class="bg-background text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<th:block th:replace="~{layout/header :: topbar('actions.list.header')}"></th:block>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">

  <div th:if="${param.donated}" class="flex justify-center -mt-4 mb-6">
    <div class="flex items-center gap-3 bg-white py-3 px-6 rounded-2xl ambient-shadow border border-emerald-100">
      <div class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">
        <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
      </div>
      <span class="text-on-surface font-medium text-sm" th:text="#{actions.list.donated}"></span>
    </div>
  </div>

  <section class="flex justify-between items-end mb-10">
    <div>
      <h2 class="text-4xl font-extrabold tracking-tight text-on-surface headline mb-2" th:text="#{actions.list.title}"></h2>
      <p class="text-on-surface-variant text-lg" th:text="#{actions.list.subtitle}"></p>
    </div>
    <a sec:authorize="hasRole('ORG_ADMIN')" ...>
      <span class="material-symbols-outlined">add_circle</span>
      <span th:text="#{actions.new}"></span>
    </a>
  </section>

  <div th:if="${#lists.isEmpty(actions)}" class="flex flex-col items-center justify-center py-24 text-center">
    <div class="w-24 h-24 bg-surface-container-low rounded-full flex items-center justify-center mb-6">
      <span class="material-symbols-outlined text-4xl text-on-surface-variant">search_off</span>
    </div>
    <h3 class="text-2xl font-bold text-on-surface headline mb-2" th:text="#{actions.list.empty}"></h3>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

    <div th:each="action : ${actions}" class="group bg-white rounded-2xl overflow-hidden ambient-shadow flex flex-col transition-all hover:-translate-y-1 hover:shadow-lg border border-slate-50">
      <div class="relative h-52 overflow-hidden bg-slate-100">
        <div th:each="media, iterStat : ${action.mediaList}" th:if="${iterStat.index == 0}">
          <img th:if="${media.mediaType == T(com.example.charite.enums.MediaType).IMAGE}"
               th:src="${media.filePath}"
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
               alt="Action Cover"/>
        </div>
        <div class="absolute top-4 left-4">
          <span class="bg-white/90 backdrop-blur-md text-primary font-bold text-[10px] px-3 py-1 rounded-full uppercase tracking-widest" th:text="#{actions.list.active}"></span>
        </div>
      </div>

      <div class="p-6 flex-1 flex flex-col">
        <div class="flex items-center gap-2 mb-2">
          <span class="material-symbols-outlined text-primary text-base">location_on</span>
          <span class="text-xs font-semibold text-on-surface-variant" th:text="${action.location}">Lieu</span>
        </div>

        <h3 class="text-xl font-bold text-on-surface mb-2 leading-tight" th:text="${action.title}">Titre</h3>
        <p class="text-sm text-on-surface-variant mb-6" th:text="${action.organization.name}">Organisation</p>

        <div class="mt-auto">
          <div class="flex justify-between text-xs font-bold mb-2 text-on-surface">
            <span th:text="#{actions.list.progress}"></span>
            <span th:text="${action.goalAmount > 0 ? (action.collectedAmount * 100 / action.goalAmount) : 0} + '%'">0%</span>
          </div>
          <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-6">
            <div class="h-full bg-primary-gradient"
                 th:style="'width: ' + ${action.goalAmount > 0 ? (action.collectedAmount * 100 / action.goalAmount) : 0} + '%'">
            </div>
          </div>

          <div class="flex justify-between items-center text-xs text-on-surface-variant border-t border-slate-50 pt-4">
            <span class="font-bold text-primary" th:text="${action.collectedAmount} + ' / ' + ${action.goalAmount} + ' MAD'">0 / 0 MAD</span>
            <a th:href="@{/actions/{id}(id=${action.id})}" class="font-bold text-slate-700 hover:text-primary transition-colors" th:text="#{actions.list.details}"></a>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

</body>
</html>
