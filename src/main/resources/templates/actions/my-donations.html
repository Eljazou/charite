<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title th:text="'CharityAct | ' + #{mydonations.title} ">Mes Dons</title>
    <th:block th:replace="~{layout/base :: common}"></th:block>
</head>
<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<th:block th:replace="~{layout/header :: topbar('donations.header', null, null)}"></th:block>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">

    <section class="flex justify-between items-end mb-10 mt-6">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1" th:text="#{donations.title}"></h2>
            <p class="text-on-surface-variant" th:text="#{donations.subtitle}"></p>
        </div>
        <a th:href="@{/actions}"
           class="bg-primary-gradient text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg hover:scale-[1.02] transition-all">
            <span class="material-symbols-outlined">add_circle</span>
            <span th:text="#{donations.btn.donate}"></span>
        </a>
    </section>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(donations)}"
         class="flex flex-col items-center justify-center py-24 text-center bg-white rounded-2xl border border-slate-100">
        <div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center mb-6">
            <span class="material-symbols-outlined text-4xl text-on-surface-variant">volunteer_activism</span>
        </div>
        <h3 class="text-xl font-bold text-on-surface mb-2" th:text="#{donations.empty.title}"></h3>
        <p class="text-on-surface-variant text-sm mb-6" th:text="#{donations.empty.sub}"></p>
        <a th:href="@{/actions}"
           class="bg-primary-gradient text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2">
            <span class="material-symbols-outlined">bolt</span>
            <span th:text="#{donations.empty.btn}"></span>
        </a>
    </div>

    <!-- DONATIONS TABLE -->
    <div th:unless="${#lists.isEmpty(donations)}" class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">

        <!-- STATS SUMMARY -->
        <div class="grid grid-cols-3 gap-0 border-b border-slate-100">
            <div class="p-6 text-center border-r border-slate-100">
                <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1" th:text="#{donations.stat.total}"></p>
                <p class="text-3xl font-black text-on-surface" th:text="${donations.size()}">0</p>
            </div>
            <div class="p-6 text-center border-r border-slate-100">
                <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1" th:text="#{donations.stat.amount}"></p>
                <p class="text-3xl font-black text-primary"
                   th:text="${#aggregates.sum(donations.![amount])} + ' MAD'">0 MAD</p>
            </div>
            <div class="p-6 text-center">
                <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1" th:text="#{donations.stat.actions}"></p>
                <p class="text-3xl font-black text-on-surface"
                   th:text="${#lists.size(donations)}">0</p>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{donations.col.action}"></th>
                    <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{donations.col.amount}"></th>
                    <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{donations.col.method}"></th>
                    <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{donations.col.message}"></th>
                    <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{donations.col.date}"></th>
                    <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{donations.col.status}"></th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                <tr th:each="donation : ${donations}" class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-bold text-sm text-on-surface" th:text="${donation.charityAction.title}"></div>
                        <div class="text-xs text-on-surface-variant" th:text="${donation.charityAction.organization.name}"></div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="font-black text-primary text-sm" th:text="${donation.amount} + ' MAD'"></span>
                    </td>
                    <td class="px-6 py-4">
                            <span class="text-xs font-bold bg-slate-100 px-2 py-1 rounded text-slate-600 whitespace-nowrap"
                                  th:text="${donation.paymentMethod.name() == 'CREDIT_CARD'} ? #{donations.method.card} :
                                 (${donation.paymentMethod.name() == 'PAYPAL'} ? #{donations.method.paypal} : #{donations.method.bank})">
                            </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-on-surface-variant"
                        th:text="${donation.message != null ? donation.message : '—'}"></td>
                    <td class="px-6 py-4 text-sm text-on-surface-variant" th:text="${donation.donationDate}"></td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span th:text="${donation.status.name() == 'COMPLETED'} ? #{donations.status.completed} :
                                           (${donation.status.name() == 'PENDING'} ? #{donations.status.pending} :
                                           #{donations.status.failed})"
                                                              th:class="${donation.status.name() == 'COMPLETED'} ? 'inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-emerald-50 text-emerald-700' :
                                             (${donation.status.name() == 'PENDING'} ? 'inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-amber-50 text-amber-700' :
                                             'inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-red-50 text-red-700')">
                            </span>

                            <a th:if="${donation.status.name() == 'PENDING'}"
                               th:href="@{/actions/{id}/donate/resume(id=${donation.charityAction.id}, donationId=${donation.id})}"
                               class="inline-flex items-center px-3 py-1 bg-orange-500 text-white text-xs rounded-full font-bold hover:bg-orange-600 transition"
                               th:text="#{donations.btn.resume}">
                            </a>
                        </div>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

</body>
</html>
