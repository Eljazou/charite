<!DOCTYPE html>
<html class="light" lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>PhilanthroLink - Créer une Action</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0053db",
            "on-surface": "#00345e",
            "on-surface-variant": "#306197",
            "background": "#f8f9ff",
            "surface-container-low": "#eff4ff",
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bg-primary-gradient { background: linear-gradient(135deg, #0053db 0%, #0048c1 100%); }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(0, 52, 94, 0.04); }
    input[type="file"]::file-selector-button {
      border: none;
      background: #dbe1ff;
      color: #0048bf;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      margin-right: 12px;
      transition: all 0.2s;
    }
    input[type="file"]::file-selector-button:hover { background: #c7d3ff; }
  </style>
</head>
<body class="bg-background text-on-surface flex">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<main class="ml-64 flex-1 min-h-screen">

  <header class="h-16 border-b border-slate-100 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 sticky top-0 z-40">
    <div class="flex items-center gap-2">
      <a th:href="@{/actions/my}" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-500">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <span class="text-sm font-semibold text-slate-600">Retour à mes actions</span>
    </div>
  </header>

  <div class="max-w-4xl mx-auto py-10 px-8">

    <div class="mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight headline">Nouvelle action de charité</h2>
      <div class="mt-3 flex items-center gap-2 p-3 bg-amber-50 border border-amber-100 rounded-2xl text-amber-700">
        <span class="material-symbols-outlined text-lg">info</span>
        <p class="text-xs font-bold uppercase tracking-wide">Soumis à l'approbation du super admin</p>
      </div>
    </div>

    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3">
      <span class="material-symbols-outlined text-red-600">error</span>
      <p class="text-red-700 text-sm font-bold" th:text="${error}"></p>
    </div>

    <form method="post" th:action="@{/actions/create}" th:object="${req}" enctype="multipart/form-data" class="space-y-6">

      <div class="bg-white rounded-3xl p-8 ambient-shadow border border-slate-50 space-y-6">

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Titre de l'action</label>
          <input type="text" th:field="*{title}" required
                 class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none transition-all"
                 placeholder="Ex: Soutien aux orphelins de Casablanca"/>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Description détaillée</label>
          <textarea th:field="*{description}" rows="4" required
                    class="w-full p-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none transition-all"
                    placeholder="Décrivez l'impact et les objectifs de votre action..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Lieu</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">location_on</span>
              <input type="text" th:field="*{location}" required
                     class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none"
                     placeholder="Ville ou région"/>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Objectif financier (MAD)</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">payments</span>
              <input type="number" step="0.01" th:field="*{goalAmount}" required
                     class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none"
                     placeholder="0.00"/>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Date de début</label>
            <input type="date" th:field="*{startDate}" required
                   class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none"/>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">Date de fin</label>
            <input type="date" th:field="*{endDate}" required
                   class="w-full px-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none"/>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-3xl p-8 ambient-shadow border border-slate-50">
        <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">gallery_thumbnail</span>
          Médias de l'action
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3">Images (Multiple)</label>
            <div class="p-4 border-2 border-dashed border-slate-200 rounded-2xl hover:border-primary/40 transition-colors">
              <input type="file" name="images" multiple accept="image/*" class="text-xs text-slate-500 w-full"/>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-3">Vidéos (Multiple)</label>
            <div class="p-4 border-2 border-dashed border-slate-200 rounded-2xl hover:border-primary/40 transition-colors">
              <input type="file" name="videos" multiple accept="video/*" class="text-xs text-slate-500 w-full"/>
            </div>
          </div>
        </div>
      </div>

      <div class="flex justify-end">
        <button type="submit"
                class="px-10 py-4 bg-primary-gradient text-white rounded-2xl font-bold text-sm shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-2">
          <span class="material-symbols-outlined">send</span>
          Soumettre l'action
        </button>
      </div>
    </form>
  </div>
</main>
</body>
</html>
