<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title th:text="#{title.user.create}"></title>
  <th:block th:replace="~{layout/base :: common}"></th:block>
</head>

<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<header class="fixed top-0 left-64 right-0 z-40 flex justify-between items-center px-8 h-16 bg-white/80 backdrop-blur-md border-b border-slate-100">
  <div class="flex items-center gap-3">
    <a th:href="@{/templates/superadmin/users}" class="text-on-surface-variant hover:text-primary transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h2 class="font-bold text-slate-800" th:text="#{user.create.header}"></h2>
  </div>
</header>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">
  <section class="mb-8 mt-6">
    <h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1" th:text="#{user.create.title}"></h2>
  </section>

  <div th:if="${error}" class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl">
    <span class="material-symbols-outlined text-red-500">error</span>
    <span class="font-medium text-sm" th:text="${error}"></span>
  </div>

  <div class="max-w-xl">
    <form method="post" th:action="@{/templates/superadmin/users/create}" th:object="${req}" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{user.create.fullname}"></label>
        <input type="text" th:field="*{fullName}" class="form-input" placeholder="Ex: Ahmed Benali"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{user.create.email}"></label>
        <input type="email" th:field="*{email}" class="form-input" placeholder="email@exemple.com"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{user.create.password}"></label>
        <input type="password" th:field="*{password}" class="form-input" placeholder="••••••••"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{user.create.role}"></label>
        <select name="role" class="form-input">
          <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
        </select>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="flex-1 bg-primary-gradient text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-all">
          <span class="material-symbols-outlined">person_add</span>
          <span th:text="#{user.create.submit}"></span>
        </button>
        <a th:href="@{/templates/superadmin/users}" class="px-6 py-3 rounded-xl font-bold border border-slate-200 text-slate-600 hover:bg-slate-50 transition-all flex items-center gap-2">
          <span th:text="#{user.create.cancel}"></span>
        </a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
