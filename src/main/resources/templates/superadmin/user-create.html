<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>Créer Utilisateur | Charite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { "primary": "#0053db", "on-surface": "#00345e", "on-surface-variant": "#306197", "surface-container-low": "#eff4ff" } } } }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3 { font-family: 'Manrope', sans-serif; }
    .bg-primary-gradient { background: linear-gradient(135deg, #0053db 0%, #0048c1 100%); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .form-input { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; color:#00345e; background:#fff; outline:none; transition:border-color 0.2s; }
    .form-input:focus { border-color:#0053db; box-shadow:0 0 0 3px rgba(0,83,219,0.1); }
  </style>
</head>
<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<header class="fixed top-0 left-64 right-0 z-40 flex justify-between items-center px-8 h-16 bg-white/80 backdrop-blur-md border-b border-slate-100">
  <div class="flex items-center gap-3">
    <a th:href="@{/admin/users}" class="text-on-surface-variant hover:text-primary transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h2 class="font-bold text-slate-800">Nouvel Utilisateur</h2>
  </div>
</header>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">
  <section class="mb-8 mt-6">
    <h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1">Créer un utilisateur</h2>
    <p class="text-on-surface-variant">Ajoutez un nouveau compte à la plateforme.</p>
  </section>

  <div th:if="${error}" class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl">
    <span class="material-symbols-outlined text-red-500">error</span>
    <span class="font-medium text-sm" th:text="${error}"></span>
  </div>

  <div class="max-w-xl">
    <form method="post" th:action="@{/admin/users/create}" th:object="${req}" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">Nom complet *</label>
        <input type="text" th:field="*{fullName}" class="form-input" placeholder="Ex: Ahmed Benali"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">Email *</label>
        <input type="email" th:field="*{email}" class="form-input" placeholder="email@exemple.com"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">Mot de passe *</label>
        <input type="password" th:field="*{password}" class="form-input" placeholder="••••••••"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">Rôle *</label>
        <select name="role" class="form-input">
          <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
        </select>
      </div>
      <button type="submit" class="w-full bg-primary-gradient text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-all">
        <span class="material-symbols-outlined">person_add</span>
        Créer l'utilisateur
      </button>
    </form>
  </div>
</main>
</body>
</html>
