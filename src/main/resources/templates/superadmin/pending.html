<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{title.pending}"></title>
    <th:block th:replace="~{layout/base :: common}"></th:block>
</head>

<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<th:block th:replace="~{layout/header :: topbar('pending.header')}"></th:block>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">
    <section class="flex justify-between items-end mb-8 mt-6">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface" th:text="#{pending.title}"></h2>
            <p class="text-on-surface-variant mt-1" th:text="#{pending.subtitle}"></p>
        </div>
    </section>

    <div th:if="${#lists.isEmpty(changes)}" class="bg-white rounded-3xl p-20 text-center border border-slate-50 shadow-sm">
        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-4xl text-slate-300">verified_user</span>
        </div>
        <h3 class="text-xl font-bold text-slate-800" th:text="#{pending.empty.title}"></h3>
        <p class="text-slate-500 mt-2" th:text="#{pending.empty.subtitle}"></p>
    </div>

    <div th:unless="${#lists.isEmpty(changes)}" class="bg-white rounded-3xl border border-slate-50 shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50/50 border-b border-slate-100">
            <tr>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500" th:text="#{pending.col.org}"></th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500" th:text="#{pending.col.type}"></th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500" th:text="#{pending.col.requester}"></th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500" th:text="#{pending.col.details}"></th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500 text-center" th:text="#{pending.col.actions}"></th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
            <tr th:each="change : ${changes}" class="hover:bg-slate-50/30 transition-colors">
                <td class="px-6 py-5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 text-primary flex items-center justify-center">
                            <span class="material-symbols-outlined text-lg">corporate_fare</span>
                        </div>
                        <div>
                                <span class="block font-bold text-slate-800 text-sm"
                                      th:if="${change.organization != null}" th:text="${change.organization.name}"></span>
                            <span class="block font-bold text-blue-600 text-sm"
                                  th:if="${change.organization == null}" th:text="#{pending.new.entity}"></span>
                            <span class="block text-[10px] text-slate-400 font-medium uppercase"
                                  th:if="${change.type == T(com.example.charite.enums.PendingChangeType).CREATE_ACTION}"
                                  th:text="'Org: ' + ${change.charityAction != null ? change.charityAction.organization.name : '-'}"></span>
                        </div>
                    </div>
                </td>

                <td class="px-6 py-5">
                        <span class="px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-tight"
                              th:classappend="${change.type.name() == 'DELETE' ? 'bg-red-50 text-red-600' : (change.type.name() == 'CREATE' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600')}"
                              th:text="${change.type}">TYPE</span>
                </td>

                <td class="px-6 py-5">
                    <div class="text-sm">
                        <p class="font-semibold text-slate-700" th:text="${change.requestedBy.fullName}"></p>
                        <p class="text-[11px] text-slate-400" th:text="${#temporals.format(change.requestedAt, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                </td>

                <td class="px-6 py-5">
                    <div class="text-xs space-y-1 bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <th:block th:if="${change.type == T(com.example.charite.enums.PendingChangeType).CREATE}">
                            <p><b class="text-slate-500" th:text="#{pending.col.org}+':'"></b> <span th:text="${change.newName}"></span></p>
                            <p><b class="text-slate-500" th:text="#{pending.field.address} + ':'"></b> <span th:text="${change.newLegalAddress}"></span></p>
                            <p><b class="text-slate-500" th:text="#{pending.field.tax} + ':'"></b> <span th:text="${change.newTaxNumber}"></span></p>
                        </th:block>

                        <th:block th:if="${change.type.name() == 'UPDATE'}">
                            <p><b class="text-slate-500" th:text="#{pending.field.name} + ':'"></b> <span th:text="${change.newName}"></span></p>
                            <p><b class="text-slate-500" th:text="#{pending.field.contact} + ':'"></b> <span th:text="${change.newMainContact}"></span></p>
                        </th:block>

                        <th:block th:if="${change.type == T(com.example.charite.enums.PendingChangeType).CREATE_ACTION}">
                            <p class="text-blue-700 font-bold"><span th:text="${change.actionTitle}"></span></p>
                            <p><b class="text-slate-500" th:text="#{pending.field.goal} + ':'"></b> <span th:text="${change.charityAction != null ? change.charityAction.goalAmount : '-'}"></span> MAD</p>
                        </th:block>

                        <p th:if="${change.type.name() == 'DELETE'}"
                           class="text-red-500 font-bold italic"
                           th:text="#{pending.delete.label}"></p>
                    </div>
                </td>

                <td class="px-6 py-5">
                    <div class="flex items-center justify-center gap-2">
                        <form method="post" th:action="@{/superadmin/approve/{id}(id=${change.id})}">
                            <button type="submit"
                                    class="w-9 h-9 rounded-full bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white transition-all flex items-center justify-center shadow-sm">
                                <span class="material-symbols-outlined text-lg">check</span>
                            </button>
                        </form>
                        <form method="post" th:action="@{/superadmin/reject/{id}(id=${change.id})}">
                            <button type="submit"
                                    class="w-9 h-9 rounded-full bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center shadow-sm">
                                <span class="material-symbols-outlined text-lg">close</span>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
