<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
  <title th:text="#{title.users}"></title>
  <th:block th:replace="~{layout/base :: common}"></th:block>
</head>

<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

<th:block th:replace="~{layout/header :: topbar('users.header')}"></th:block>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">

  <div th:if="${param.created}" data-alert class="mt-6 mb-4 flex items-center gap-3 bg-emerald-50 border border-emerald-200 text-emerald-800 px-5 py-3 rounded-xl">
    <span class="material-symbols-outlined text-emerald-600">check_circle</span>
    <span class="font-medium text-sm" th:text="#{users.created}"></span>
  </div>
  <div th:if="${param.updated}" data-alert class="mt-6 mb-4 flex items-center gap-3 bg-blue-50 border border-blue-200 text-blue-800 px-5 py-3 rounded-xl">
    <span class="material-symbols-outlined text-blue-600">info</span>
    <span class="font-medium text-sm" th:text="#{users.updated}"></span>
  </div>
  <div th:if="${param.deleted}" data-alert class="mt-6 mb-4 flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl">
    <span class="material-symbols-outlined text-red-600">delete</span>
    <span class="font-medium text-sm" th:text="#{users.deleted}"></span>
  </div>

  <section class="flex justify-between items-end mb-8 mt-6">
    <div>
      <h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1" th:text="#{users.title}"></h2>
      <p class="text-on-surface-variant" th:text="#{users.subtitle}"></p>
    </div>
    <a th:href="@{/templates/superadmin/users/create}"
       class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg hover:scale-[1.02] transition-all">
      <span class="material-symbols-outlined">person_add</span>
      <span th:text="#{users.create}"></span>
    </a>
  </section>

  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
        <tr class="bg-slate-50 border-b border-slate-100">
          <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{users.col.name}"></th>
          <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{users.col.email}"></th>
          <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{users.col.role}"></th>
          <th class="px-6 py-4 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="#{users.col.actions}"></th>
        </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
        <tr th:each="user : ${users}" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-full bg-primary-gradient flex items-center justify-center text-white text-xs font-bold"
                   th:text="${#strings.substring(user.fullName, 0, 1)}">U</div>
              <span class="font-bold text-sm" th:text="${user.fullName}"></span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-on-surface-variant" th:text="${user.email}"></td>
          <td class="px-6 py-4">
                            <span th:text="${user.role}"
                                  th:class="${user.role.name() == 'SUPER_ADMIN'} ? 'inline-flex px-3 py-1 rounded-full text-xs font-bold bg-purple-50 text-purple-700' :
                                             (${user.role.name() == 'ORG_ADMIN'} ? 'inline-flex px-3 py-1 rounded-full text-xs font-bold bg-blue-50 text-blue-700' :
                                             'inline-flex px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-600')">
                            </span>
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-2">
              <a th:href="@{/templates/superadmin/users/edit/{id}(id=${user.id})}"
                 class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold text-primary bg-surface-container-low hover:bg-blue-100 transition-colors">
                <span class="material-symbols-outlined text-sm">edit</span>
                <span th:text="#{users.edit}"></span>
              </a>
              <form method="post" th:action="@{/templates/superadmin/users/delete/{id}(id=${user.id})}" class="inline">
                <button type="submit"
                        onclick="return confirm('Supprimer cet utilisateur ?')"
                        class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-colors border-none cursor-pointer">
                  <span class="material-symbols-outlined text-sm">delete</span>
                  <span th:text="#{users.delete}"></span>
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const alerts = document.querySelectorAll('[data-alert]');
    alerts.forEach(alert => {
      setTimeout(() => {
        alert.style.transition = 'opacity 0.5s ease';
        alert.style.opacity = '0';
        setTimeout(() => alert.remove(), 500);
      }, 3000);
    });
  });
</script>
</body>
</html>
