<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{action.edit.title}">Modifier l'Action</title>
    <th:block th:replace="~{layout/base :: common}"></th:block>
</head>
<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>
<th:block th:replace="~{layout/header :: topbar('orgadmin.action.create.header')}"></th:block>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">

    <section class="flex justify-between items-end mb-8 mt-6">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1" th:text="#{action.edit.title}"></h2>
            <p class="text-on-surface-variant" th:text="#{action.edit.subtitle}"></p>
        </div>
    </section>

    <!-- BANDEAU CONFORMITE -->
    <div class="mb-8 p-5 bg-amber-50 border border-amber-200 rounded-2xl flex items-start gap-4">
        <span class="material-symbols-outlined text-amber-500">verified_user</span>
        <div>
            <h4 class="text-amber-900 font-bold text-sm" th:text="#{action.edit.compliance.title}"></h4>
            <p class="text-amber-800/80 text-xs mt-0.5 font-medium" th:text="#{action.edit.compliance.msg}"></p>
        </div>
    </div>

    <!-- ERROR -->
    <div th:if="${error}" class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl">
        <span class="material-symbols-outlined text-red-500">error</span>
        <span class="font-medium text-sm" th:text="${error}"></span>
    </div>

    <form method="post" th:action="@{/orgadmin/actions/edit/{id}(id=${actionId})}"
          th:object="${req}" enctype="multipart/form-data">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- COLONNE GAUCHE -->
            <div class="lg:col-span-2 space-y-6">

                <!-- INFORMATIONS -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-base text-on-surface mb-5 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">bolt</span>
                        <span th:text="#{action.edit.info.title}"></span>
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.field.title}"></label>
                            <input type="text" th:field="*{title}" class="form-input" th:placeholder="#{action.edit.title.placeholder}"/>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.field.location}"></label>
                            <input type="text" th:field="*{location}" class="form-input" th:placeholder="#{action.edit.location.placeholder}"/>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.field.startdate}"></label>
                                <input type="date" name="startDate" class="form-input" th:value="${req.startDate}"/>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.field.enddate}"></label>
                                <input type="date" name="endDate" class="form-input" th:value="${req.endDate}"/>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.field.status}"></label>
                            <select th:field="*{status}" class="form-input">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"
                                        th:selected="${s == req.status}">
                                </option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.field.goal}"></label>
                            <input type="number" step="0.01" th:field="*{goalAmount}" class="form-input" placeholder="0.00"/>
                        </div>
                    </div>
                </div>

                <!-- DESCRIPTION -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-base text-on-surface mb-5 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">description</span>
                        <span th:text="#{action.edit.description}"></span>
                    </h3>
                    <textarea th:field="*{description}" class="form-input" rows="5"
                              th:placeholder="#{action.edit.desc.placeholder}"></textarea>
                </div>

                <!-- MEDIAS -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-base text-on-surface mb-5 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">photo_library</span>
                        <span th:text="#{action.edit.media.title}"></span>
                    </h3>

                    <!-- MEDIAS EXISTANTS -->
                    <div th:if="${currentMedias != null and !#lists.isEmpty(currentMedias)}" class="mb-6">
                        <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-3" th:text="#{action.edit.media.current}"></p>
                        <div class="grid grid-cols-3 gap-3">
                            <div th:each="media : ${currentMedias}" class="relative group">
                                <img th:if="${media.mediaType == T(com.example.charite.enums.MediaType).IMAGE}"
                                     th:src="${media.filePath}"
                                     class="w-full h-24 object-cover rounded-xl border border-slate-100"/>
                                <video th:if="${media.mediaType == T(com.example.charite.enums.MediaType).VIDEO}"
                                       th:src="${media.filePath}"
                                       class="w-full h-24 rounded-xl border border-slate-100"
                                       controls></video>
                                <form method="post" th:action="@{/orgadmin/actions/media/delete/{mediaId}(mediaId=${media.id})}">
                                    <input type="hidden" name="actionId" th:value="${actionId}"/>
                                    <button type="submit"
                                            th:onclick="'return confirm(\'' + #{action.edit.media.confirm.delete} + '\')'"
                                            class="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity border-none cursor-pointer">
                                        ✕
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- NOUVEAUX MEDIAS -->
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.media.add.images}"></label>
                            <input type="file" name="images" multiple accept="image/*" class="form-input"/>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.edit.media.add.videos}"></label>
                            <input type="file" name="videos" multiple accept="video/*" class="form-input"/>
                        </div>
                    </div>
                </div>

            </div>

            <!-- COLONNE DROITE -->
            <div class="space-y-6">

                <!-- SUBMIT -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <div class="flex items-start gap-3 mb-5 bg-amber-50 border border-amber-200 rounded-xl p-4">
                        <span class="material-symbols-outlined text-amber-500 text-sm mt-0.5">info</span>
                        <p class="text-xs text-amber-800 font-medium" th:text="#{action.edit.approval.msg}"></p>
                    </div>
                    <button type="submit"
                            class="w-full bg-primary-gradient text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-all">
                        <span class="material-symbols-outlined">sync_saved_locally</span>
                        <span th:text="#{action.edit.submit}"></span>
                    </button>
                    <a th:href="@{/orgadmin/actions}"
                       class="w-full mt-3 flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-on-surface-variant hover:bg-slate-50 transition-colors text-sm">
                        <span class="material-symbols-outlined text-sm">arrow_back</span>
                        <span th:text="#{action.edit.back}"></span>
                    </a>
                </div>

                <!-- RESUME -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-sm text-on-surface mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">info</span>
                        <span th:text="#{action.edit.summary}"></span>
                    </h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between">
                            <span class="text-on-surface-variant" th:text="#{action.edit.summary.title}"></span>
                            <span class="font-bold text-on-surface text-right max-w-[60%] truncate" th:text="${req.title}"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-on-surface-variant" th:text="#{action.edit.summary.status}"></span>
                            <span th:text="${req.status}"
                                  th:class="${req.status != null and req.status.name() == 'ACTIVE'} ? 'font-bold text-emerald-600' :
                                             (${req.status != null and req.status.name() == 'PENDING_APPROVAL'} ? 'font-bold text-amber-600' :
                                             (${req.status != null and req.status.name() == 'REJECTED'} ? 'font-bold text-red-600' :
                                             'font-bold text-slate-600'))">
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-on-surface-variant" th:text="#{action.edit.summary.goal}"></span>
                            <span class="font-bold text-primary" th:text="${req.goalAmount} + ' MAD'"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-on-surface-variant" th:text="#{action.edit.summary.medias}"></span>
                            <span class="font-bold text-on-surface"
                                  th:text="${currentMedias != null ? currentMedias.size() : 0} + ' fichier(s)'"></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </form>
</main>
</body>
</html>
