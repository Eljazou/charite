<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nouvelle Action</title>
    <th:block th:replace="~{layout/base :: common}"></th:block>
</head>
<body class="bg-[#f8f9ff] text-on-surface">

<th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>
<th:block th:replace="~{layout/header :: topbar('orgadmin.action.create.header',null,null)}"></th:block>

<main class="ml-64 pt-16 pb-12 px-10 min-h-screen">

    <section class="flex justify-between items-end mb-8 mt-6">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-1" th:text="#{action.create.title}"></h2>
            <p class="text-on-surface-variant" th:text="#{action.create.subtitle}"></p>
        </div>
    </section>

    <!-- BANDEAU INFO -->
    <div class="mb-8 p-5 bg-blue-50 border border-blue-200 rounded-2xl flex items-start gap-4">
        <span class="material-symbols-outlined text-blue-500">info</span>
        <div>
            <h4 class="text-blue-900 font-bold text-sm" th:text="#{action.create.compliance.title}"></h4>
            <p class="text-blue-800/80 text-xs mt-0.5 font-medium" th:text="#{action.create.compliance.msg}"></p>
        </div>
    </div>

    <!-- ERROR -->
    <div th:if="${error}" class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl">
        <span class="material-symbols-outlined text-red-500">error</span>
        <span class="font-medium text-sm" th:text="${error}"></span>
    </div>

    <form method="post" th:action="@{/orgadmin/actions/create}"
          th:object="${req}" enctype="multipart/form-data">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- COLONNE GAUCHE -->
            <div class="lg:col-span-2 space-y-6">

                <!-- INFORMATIONS -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-base text-on-surface mb-5 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">bolt</span>
                        <span th:text="#{action.create.info.title}"></span>
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.field.title}"></label>
                            <input type="text" th:field="*{title}" class="form-input" th:placeholder="#{action.create.title.placeholder}"/>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.field.location}"></label>
                            <input type="text" th:field="*{location}" class="form-input" th:placeholder="#{action.create.location.placeholder}"/>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.field.startdate}"></label>
                                <input type="date" name="startDate" class="form-input"/>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.field.enddate}"></label>
                                <input type="date" name="endDate" class="form-input"/>
                            </div>
                        </div>
                        <!-- PAS DE CHAMP STATUT ici — toujours PENDING_APPROVAL à la création -->
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.field.goal}"></label>
                            <input type="number" step="0.01" th:field="*{goalAmount}" class="form-input" placeholder="0.00"/>
                        </div>
                    </div>
                </div>

                <!-- DESCRIPTION -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-base text-on-surface mb-5 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">description</span>
                        <span th:text="#{action.create.description}"></span>
                    </h3>
                    <textarea th:field="*{description}" class="form-input" rows="5"
                              th:placeholder="#{action.create.desc.placeholder}"></textarea>
                </div>

                <!-- MEDIAS -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <h3 class="font-bold text-base text-on-surface mb-5 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">photo_library</span>
                        <span th:text="#{action.create.media.title}"></span>
                    </h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.media.images}"></label>
                            <input type="file" name="images" multiple accept="image/*" class="form-input"/>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5" th:text="#{action.create.media.videos}"></label>
                            <input type="file" name="videos" multiple accept="video/*" class="form-input"/>
                        </div>
                    </div>
                </div>

            </div>



            <div class="space-y-6">
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                    <div class="flex items-start gap-3 mb-5 bg-blue-50 border border-blue-200 rounded-xl p-4">
                        <span class="material-symbols-outlined text-blue-500 text-sm mt-0.5">pending</span>
                        <p class="text-xs text-blue-800 font-medium" th:text="#{action.create.approval.msg}"></p>
                    </div>
                    <button type="submit"
                            class="w-full bg-primary-gradient text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-all">
                        <span class="material-symbols-outlined">add_circle</span>
                        <span th:text="#{action.create.submit}"></span>
                    </button>
                    <a th:href="@{/orgadmin/actions}"
                       class="w-full mt-3 flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-on-surface-variant hover:bg-slate-50 transition-colors text-sm">
                        <span class="material-symbols-outlined text-sm">arrow_back</span>
                        <span th:text="#{action.create.back}"></span>
                    </a>
                </div>
            </div>

        </div>
    </form>
</main>
</body>
</html>
